; InfoTerm PlatformIO project
; Board target: ESP32-2432S028R / ESP-WROOM-32 with 2.8" 240x320 TFT
;
; Common commands:
;   pio run
;   pio run -t upload
;   pio device monitor
;
; Windows PowerShell fallback when pio is not in PATH:
;   & "$env:USERPROFILE\.platformio\penv\Scripts\platformio.exe" run
;   & "$env:USERPROFILE\.platformio\penv\Scripts\platformio.exe" run -t upload

[platformio]
default_envs = esp32_2432s028r
src_dir = src
include_dir = include

[env:esp32_2432s028r]
platform = espressif32@7.0.1
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; PlatformIO's Arduino-framework upload does NOT derive the firmware flash
; offset from board_build.partitions - it defaults to a fixed 0x10000
; (platform-espressif32 builder/main.py: ESP32_APP_OFFSET =
; board.get("upload.offset_address", "0x10000")) regardless of where app0
; actually sits in the partition table. Since partitions_infoterm.csv moves
; app0 to 0x50000, this MUST be overridden here, or firmware.bin gets
; written to the wrong address while the partition table still points
; elsewhere - the bootloader then finds no valid app image and hangs.
board_upload.offset_address = 0x50000

; Separately: PlatformIO ALWAYS writes boot_app0.bin to hardcoded physical
; address 0xE000 on every upload, no matter what this table says (there is
; no working override - board_upload.ota_partition_offset does NOT affect
; it, confirmed by testing). partitions_infoterm.csv places `otadata`
; exactly at 0xE000 for this reason (its conventional home anyway) and
; keeps `nvs` starting only at 0x10000, so nvs never overlaps that address -
; an earlier layout that let nvs span across 0xE000 caused every single
; upload to silently corrupt whatever nvs entries physically landed in that
; ~8KB window (general settings + first few MQTT slots reproducibly wiped
; on every reflash, but never on a plain reset).

; No board_build.filesystem and no data_dir: the WebGUI is fully inline HTML/
; CSS/JS (see partitions_infoterm.csv for why the spiffs partition is
; nonetheless kept - it backs the config Backup/Restore feature, which mounts
; LittleFS itself). `pio run -t uploadfs` is therefore unnecessary; only
; `pio run -t upload` is needed for any change in this project.
;
; IMPORTANT: this table's offsets differ from huge_app.csv. On any device
; that was ever flashed with huge_app.csv, run `pio run -t erase` (full chip
; erase) ONCE before the first `pio run -t upload` with this table - a plain
; upload does not erase data partitions and stale bytes from the old app0
; region can overlap the new nvs region, causing a boot hang.
board_build.partitions = partitions_infoterm.csv

; Use PlatformIO/ESP32 framework libraries for WiFi, HTTPClient, WebServer,
; WiFiClientSecure, FS, Preferences and LittleFS. Do NOT add the full Arduino
; libraries folder via lib_extra_dirs, because it may shadow ESP32 core libs
; with incompatible generic Arduino libraries.
lib_ldf_mode = chain+
lib_deps =
  bblanchon/ArduinoJson@7.4.3
  knolleary/PubSubClient@2.8
  bodmer/TFT_eSPI@2.5.43
  paulstoffregen/XPT2046_Touchscreen
  LittleFS
  ciniml/WireGuard-ESP32@^0.1.5

build_flags =
  -I .
  -D TOUCH_CS=33
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_RGB_ORDER=TFT_BGR
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_GFXFF=1
  -D SPI_FREQUENCY=40000000
  -D SPI_TOUCH_FREQUENCY=2500000

; Host-side unit tests for the Arduino-free logic in include/InfoTermLogic.h.
; Run with:  pio test -e native   (requires a host g++ on PATH; see
; CONTRIBUTING.md for install options on Windows - without one, the tests
; run only in CI on Ubuntu).
; NOTE: do NOT "Build" this env from the IDE task list - "pio run -e native"
; tries to compile the Arduino firmware sources with a host compiler and
; always fails here ("g++ nicht gefunden"). That failure is harmless and
; says nothing about the firmware; the real firmware build is
; "pio run" / env esp32_2432s028r (default_envs above).
[env:native]
platform = native
test_framework = unity
build_flags =
  -std=c++17
  -I include
